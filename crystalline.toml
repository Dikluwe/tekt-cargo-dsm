# crystalline.toml — config do crystalline-lint (tekt-linter v0.1.0) para o
# tekt-cargo-dsm. Criado no prompt 0049; o L1 virou pasta-camada no 0050.
#
# `01_core` é a PASTA-CAMADA L1 (decisão do 0049: camada é diretório, cada crate
# vive dentro do diretório da sua camada). Os SEIS crates L1 vivem dentro:
#   01_core/{core, investiga, resolve, filtro, ranking, estrutura}
# Com isso o V8 (AlienFile) zera — todos os arquivos pertencem a uma camada.

[project]
root = "."

[languages]
rust = { grammar = "tree-sitter-rust", enabled = true }

# Uma pasta-camada por camada. `01_core` cobre os seis crates L1 (0050).
[layers]
L0  = "00_nucleo"
L1  = "01_core"
L2  = "02_shell"
L3  = "03_infra"
L4  = "04_wiring"
lab = "lab"

[excluded]
build = "target"
vcs   = ".git"
cargo = ".cargo"

# Módulos internos dos crates L1 — usados pela resolução de `crate::`.
[module_layers]
entities = "L1"
domain   = "L1"

# Portas públicas do L1 (subdiretórios acessíveis de fora) — V9.
[l1_ports]
entities = "entities"
domain   = "domain"

# Dependências INTRA-L1 autorizadas. `lente_core` é a fundação de dados pura
# (cargo tree -p lente_core = só o crate); os outros crates L1 dependem dela
# (e, em testes, de si mesmos) — dependência **intra-camada**, permitida no
# Tekt. O linter resolve todo `use lente_*::` como camada Desconhecida
# (rs_parser::resolve_layer só inspeciona `crate::`/`super::`), então não
# distingue um crate L1 first-party de um pacote de terceiros — daí listá-los
# aqui. NÃO inclui terceiros reais (serde, etc.) nem enums locais (o `use
# Kind::*` continua falso positivo do V14, reportado, não silenciado).
[l1_allowed_external]
rust = [
    "lente_core",
    "lente_investiga",
    "lente_resolve",
    "lente_filtro",
    "lente_ranking",
    "lente_estrutura",
]
typescript = []
python     = []
zig        = []
