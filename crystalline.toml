# Crystalline Architecture Configuration for crystalline-dsm
# Estaleiro de dogfooding: valida as fronteiras físicas entre as crates do workspace

[layers]
# L1 - Core: Não pode depender de mais ninguém além da stdlib e permitidos
"01_core" = []

# L2 - Casca: Lida com a CLI UI e mensagens ao usuário. Depende apenas do Core.
"02_shell" = ["01_core"]

# L3 - Infraestrutura: Parsing estático de Rust e escrita de arquivos. Depende apenas do Core.
"03_infra" = ["01_core"]

# L4 - Fiação: Ponto de entrada (binário) e orquestrador do fluxo do programa. Depende de todas as camadas.
"04_wiring" = ["01_core", "02_shell", "03_infra"]

[l1_allowed_external]
# Dependências permitidas no Core
"thiserror" = {}
"serde" = { features = ["derive"] }
