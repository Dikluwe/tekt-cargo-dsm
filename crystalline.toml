# crystalline.toml — config do crystalline-lint (tekt-linter v0.1.0) para o
# tekt-cargo-dsm. Criado no prompt 0049; o L1 virou pasta-camada no 0050.
#
# `01_core` é a PASTA-CAMADA L1 (decisão do 0049: camada é diretório, cada crate
# vive dentro do diretório da sua camada). Os SEIS crates L1 vivem dentro:
#   01_core/{core, investiga, resolve, filtro, ranking, estrutura}
# Com isso o V8 (AlienFile) zera — todos os arquivos pertencem a uma camada.

[project]
root = "."

[languages]
rust = { grammar = "tree-sitter-rust", enabled = true }

# Uma pasta-camada por camada. `01_core` cobre os seis crates L1 (0050).
[layers]
L0  = "00_nucleo"
L1  = "01_core"
L2  = "02_shell"
L3  = "03_infra"
L4  = "04_wiring"
lab = "lab"

[excluded]
build = "target"
vcs   = ".git"
cargo = ".cargo"

# Agregadores estruturais excluídos da checagem de linhagem (ADR-0010 do linter:
# fora da topologia de camadas). `mod.rs`/`lib.rs` que só fazem `pub mod` (sem
# interface pública própria) não são nucleados — exclusão por path relativo
# exato. Migração de convenção, prompt 0059 (escala arquivo-a-arquivo).
[excluded_files]
core_lib          = "01_core/core/src/lib.rs"
core_domain_mod   = "01_core/core/src/domain/mod.rs"
core_entities_mod = "01_core/core/src/entities/mod.rs"
# `[excluded_files]` reservado a (regra fixada no 0062): testes (não são unidade
# de arquitetura), quarentena que será removida, e agregadores só-`pub mod` (sem
# corpo — V4/V13 não teriam o que checar). Interno de LÓGICA ATIVA do L1 NÃO entra
# aqui (perderia a guarda de pureza — laudo 0061): ganha prompt mínimo e fica no
# walk. Por isso o `investiga/vizinhanca.rs` saiu daqui (0062) — é lógica `pub(crate)`
# pura que fica.
investiga_fontes      = "01_core/investiga/src/fontes.rs"   # E2 em quarentena (laudo 0014)
# Agregador só-`pub mod` da CLI (L2, 0063): a lib de apresentação só agrupa
# `args`/`saida` (sem corpo) — V1–V14 nada têm a checar.
cli_lib               = "02_shell/cli/src/lib.rs"
# Arquivo de teste de integração (`tests/`): harness de verificação, não unidade
# arquitetural — não se nucleia.
filtro_e2e_test       = "01_core/filtro/tests/e2e_lente_core.rs"

# Módulos internos dos crates L1 — usados pela resolução de `crate::`.
[module_layers]
entities = "L1"
domain   = "L1"

# Portas públicas do L1 (subdiretórios acessíveis de fora) — V9.
[l1_ports]
entities = "entities"
domain   = "domain"

# L1 puro: nenhum externo de terceiros autorizado. A whitelist dos seis
# `lente_*` (aberta no 0050 como contorno do falso positivo do V14) foi
# **liquidada no 0053**: o conserto do linter (0052 — `classify_import` ciente
# das dependências reais de cada crate) passou a resolver `use lente_*::` para a
# camada do membro first-party, não mais para Desconhecida — então a dep
# intra-L1 já não dispara V14 e não precisa de autorização manual.
[l1_allowed_external]
rust       = []
typescript = []
python     = []
zig        = []
