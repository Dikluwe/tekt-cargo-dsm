[package]
name = "lente_cli"
version = "0.0.0"
edition = "2024"
rust-version = "1.91"
publish = false

[[bin]]
name = "lente"
path = "src/main.rs"

[dependencies]
lente_core = { path = "../../01_core/core" }
lente_wiring = { path = "../../04_wiring" }
lente_catalogo = { path = "../catalogo" }
clap = { version = "4", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
# Só nos testes (constroem variantes específicas de `ErroAdaptador`).
lente_infra = { path = "../../03_infra" }
